<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#09090b">
<link rel="manifest" href="./manifest.json">
<title>Call Guide iPad</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-base: #000000;
    --bg-surface: #0a0a0a;
    --bg-elevated: #171717;
    --border: #262626;
    --border-hover: #404040;
    
    --text-primary: #ffffff;
    --text-secondary: #a3a3a3;
    --text-muted: #52525b; /* Darker than before to aggressively suppress notes */
    
    --accent: #f59e0b;
    --accent-hover: #fbbf24;
    --accent-muted: rgba(245, 158, 11, 0.15);
    
    --green: #22c55e;
    --green-muted: rgba(34, 197, 94, 0.15);
    
    --red: #ef4444;
    --red-muted: rgba(239, 68, 68, 0.15);
    
    --blue: #818cf8;
    --blue-muted: rgba(129, 140, 248, 0.15);
    
    --purple: #a78bfa;
    --purple-muted: rgba(167, 139, 250, 0.15);
    
    --radius: 16px;
    --transition: 200ms ease;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    height: 100vh;
    height: 100dvh; /* Better mobile handling */
    display: flex;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    user-select: none; /* Prevent accidental text selection while swiping */
  }

  /* --- iPad Layout Core --- */
  
  /* Reading Area (Left Pane) */
  .reader-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
    position: relative;
    border-right: 1px solid var(--border);
    background: var(--bg-base);
    z-index: 10;
  }

  /* Header inside Reader */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 48px;
    flex-shrink: 0;
  }

  .step-label {
    font-size: 14px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
  }
  .step-label .current {
    color: var(--accent);
  }

  .progress-bar {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .progress-bar .seg {
    width: 48px;
    height: 6px;
    border-radius: 3px;
    background: var(--bg-elevated);
    transition: background var(--transition);
  }
  .progress-bar .seg.active {
    background: var(--accent);
  }
  .progress-bar .seg.done {
    background: var(--green);
  }

  /* Main Script Content */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 80px; /* Big gutters for iPad */
    overflow-y: auto;
    width: 100%;
    -webkit-overflow-scrolling: touch;
  }
  
  /* The "Stack Container" for holding the script AND injected handler cards */
  .stack-container {
    flex: 1; /* Fix for older Safari flex height bug */
    position: relative;
    width: 100%;
    min-height: 100%;
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* Animations for state changes */
  .stack-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transform: translateX(20px);
    transition: all 300ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  .stack-layer.active {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(0);
  }
  .stack-layer.past {
    transform: translateX(-20px);
  }
  
  /* Pushed Objections (Breadcrumb style) */
  .stack-layer.handler-layer {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px;
    transform: translateY(100px); /* Slides up from bottom */
    z-index: 20;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  }
  .stack-layer.handler-layer.active {
    transform: translateY(0);
  }

  /* --- Script Typography --- */
  
  .label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    background: var(--accent-muted);
    padding: 8px 16px;
    border-radius: 8px;
    margin-bottom: 32px;
    width: fit-content;
  }

  .dialogue {
    font-size: 42px; /* GIANT text for iPad glanceability */
    line-height: 1.4;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 32px;
    text-align: left;
    letter-spacing: -0.5px;
  }
  .dialogue strong {
    color: var(--accent);
    font-weight: 700;
  }
  .dialogue .beat {
    display: inline-block;
    margin-top: 20px;
    font-size: 16px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--red);
    background: var(--red-muted);
    padding: 8px 16px;
    border-radius: 8px;
  }

  .dialogue-sm {
    font-size: 28px;
    line-height: 1.5;
    color: var(--text-primary);
    margin-bottom: 24px;
    text-align: left;
    padding-left: 24px;
    border-left: 4px solid var(--border);
  }

  /* Aggressively dim instructions so they don't break reading flow */
  .note {
    font-size: 18px;
    color: var(--text-muted);
    margin-bottom: 24px;
    line-height: 1.5;
    text-align: left;
  }
  .note.warn {
    color: var(--red);
    font-weight: 700;
  }

  .tone {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--blue);
    background: var(--blue-muted);
    padding: 6px 14px;
    border-radius: 8px;
    margin-bottom: 16px;
    width: fit-content;
  }

  /* --- Buttons & Inputs --- */
  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 16px;
  }
  /* Massive branching buttons */
  .actions.col {
    flex-direction: column;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 24px 32px; /* Massive touch target */
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg-surface);
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
    outline: none;
    text-align: left;
    min-height: 80px; 
  }
  .btn:active {
    transform: scale(0.98);
  }
  .btn.primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 700;
  }
  
  /* Handler Return Button (Giant anchor) */
  .btn.return-anchor {
    background: var(--blue);
    color: #000;
    border: none;
    font-size: 24px;
    font-weight: 800;
    width: 100%;
    margin-top: 40px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .input-group {
    display: flex;
    gap: 16px;
    margin-bottom: 40px;
  }
  .input-group input {
    padding: 24px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg-surface);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 24px;
    font-weight: 600;
    outline: none;
    width: 300px;
  }
  .input-group input:focus {
    border-color: var(--accent);
  }
  .input-group .sm { width: 200px; }

  /* --- Right Dock (Objections & Context) --- */
  .dock-pane {
    width: 320px;
    flex-shrink: 0;
    background: var(--bg-surface);
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border);
    height: 100%;
    overflow-y: auto;
  }

  .dock-header {
    padding: 24px;
    font-size: 14px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg-surface);
    z-index: 5;
  }

  .dock-section {
    padding: 24px;
    border-bottom: 1px solid var(--border);
  }
  .dock-section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 16px;
  }

  /* Dock "Quick Pick" Buttons */
  .dock-btn {
    display: flex;
    flex-direction: column;
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    margin-bottom: 12px;
    cursor: pointer;
    text-align: left;
    transition: all var(--transition);
  }
  .dock-btn:active {
    background: var(--border);
  }
  .dock-btn .dock-them {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .dock-btn .dock-hint {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  /* --- Question Cards in Script --- */
  .q-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 32px;
  }
  .q-card {
    padding: 24px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg-surface);
    cursor: pointer;
  }
  .q-card .q-text {
    font-size: 24px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .q-card .q-when {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 8px;
  }

  /* Helper for inline responses when a Q card is tapped */
  .inline-resp {
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: none;
  }
  .q-card.active .inline-resp {
    display: block;
  }
  
  .inline-item {
    padding: 16px;
    background: var(--bg-elevated);
    border-radius: 12px;
    margin-bottom: 12px;
  }
  .inline-item .ii-them {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .inline-item .ii-you {
    font-size: 20px;
    color: var(--text-primary);
  }

  /* --- Helpers --- */
  .swipe-hint {
    position: absolute;
    bottom: 24px;
    right: 48px;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    pointer-events: none;
    opacity: 0.5;
  }

  /* --- Portrait Overrides (For holding iPad vertically) --- */
  @media (max-width: 900px) {
    body {
      flex-direction: column;
    }
    .reader-pane {
      border-right: none;
      border-bottom: 1px solid var(--border);
      height: 70vh; /* Re-allocate space */
    }
    .dock-pane {
      width: 100%;
      height: 30vh;
      border-left: none;
      flex-direction: row;
      flex-wrap: nowrap;
      overflow-x: auto;
      align-items: flex-start;
      padding: 16px;
      gap: 16px;
    }
    .dock-header, .dock-section-title {
      display: none; /* Hide categorical headers to save vertical space */
    }
    .dock-section {
      display: flex;
      padding: 0;
      border: none;
      gap: 12px;
      flex-shrink: 0;
    }
    .dock-btn {
      width: 280px;
      margin-bottom: 0;
      flex-shrink: 0;
    }
    main {
      padding: 0 32px;
    }
    .dialogue {
      font-size: 32px;
    }
    .btn {
      padding: 20px 24px;
      font-size: 18px;
    }
  }
  /* Version Selector */
  .version-selector {
    display: flex;
    gap: 4px;
    background: var(--bg-elevated);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 40px;
    width: fit-content;
  }
  .version-selector .v-btn {
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all var(--transition);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .version-selector .v-btn.active {
    background: var(--accent);
    color: #000;
  }
  .version-selector .v-btn[data-v="v2"].active {
    background: var(--purple);
    color: #000;
  }
  .v2-tag {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.5px;
    color: var(--purple);
    background: var(--purple-muted);
    padding: 4px 10px;
    border-radius: 6px;
    margin-left: 12px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<!-- Left: Main Script Sequence -->
<div class="reader-pane" id="readerPane">
  <header>
    <span class="step-label"><span class="current" id="stepLabel">PREP</span></span>
    <nav class="progress-bar" id="progress" aria-label="Call progress"></nav>
  </header>

  <main>
    <div class="stack-container" id="stackContainer">
      <!-- Content layers are injected here via JS -->
    </div>
  </main>
  
  <div class="swipe-hint" id="swipeHint">Swipe Left to Advance --</div>
</div>

<!-- Right: Contextual Objection Dock -->
<div class="dock-pane" id="dockPane">
  <div class="dock-header">Live Handlers</div>
  <!-- Dock content injected dynamically based on context -->
  <div id="dockContent"></div>
</div>

<script>
let prospectName = '';
let reconTime = '';
let globalHistory = []; // Stack of base script steps
let handlerStack = []; // Stack of injected objections
let selectedVersion = 'v1'; // 'v1' or 'v2'

const totalSteps = 7;
let currentStepIdx = 0;

// Universal Objections (always available in dock)
const ALWAYS_ON_HANDLERS = [
  { id: 'busy', label: 'I\'m busy', hint: 'Bad timing vs not interested',
    them: 'I\'m busy / Call me back',
    you: '"Totally fair — is it that this is bad time, or this just isn\'t for you?"',
    warn: 'If bad timing: "When\'s better?" If not: graceful exit.'},
  { id: 'gatekeeper', label: 'Gatekeeper', hint: 'Not the owner',
    them: 'I\'m the receptionist / wife',
    you: '"Oh, you deal with the phones? You probably know more than the owner. What happens to calls after you close?"',
    warn: ''},
  { id: 'sales', label: 'Is this a sales call?', hint: 'Defuse pressure',
    them: 'Are you selling something?',
    you: '"Not really — I\'m a developer, not a salesman. I built something and I want to see if it\'s actually useful. Can I ask you one question?"',
    warn: ''}
];

// Contextual Dock Configuration
const CONTEXT_DOCKS = {
  PREP: [],
  OPEN: ALWAYS_ON_HANDLERS,
  DISCOVER: ALWAYS_ON_HANDLERS,
  CONFIRM: ALWAYS_ON_HANDLERS,
  OFFER: [
    ...ALWAYS_ON_HANDLERS,
    { id: 'already_have', label: 'Already got an answering service', hint: 'Differentiation',
      them: 'We have a service for that',
      you: '"An answering service just takes a name and number. This qualifies the call and texts you the full picture so you call back ready to close."',
      warn: ''}
  ],
  PRICE: [
    { id: 'expensive', label: 'Too expensive', hint: 'Anchor to loss',
      them: 'Too expensive',
      you: '"What are you paying for an answering service? And think about your average ticket — one missed call is what, $3,500? This catches 2-3 a week."',
      warn: ''},
    { id: 'tiers', label: 'What\'s the difference?', hint: 'Pro vs Lite',
      them: 'Difference between tiers?',
      you: 'Pro: bilingual, ServiceTitan booking, 24/7 or after-hours. Lite: $600/mo, after-hours only, no bilingual, no ServiceTitan.',
      warn: ''},
    { id: 'guarantee', label: 'What if it doesn\'t work?', hint: 'Zero risk',
      them: 'What if it doesn\'t work?',
      you: '"95% answer rate in 30 days or full refund. You keep everything we built — the AI, the phone number. Zero risk."',
      warn: ''}
  ],
  CLOSE: [
    { id: 'catch', label: 'What\'s the catch? (Free)', hint: 'Student angle',
      them: 'What\'s the catch? Why free?',
      you: '"I\'m a student. I want proof it works on real HVAC calls. That proof is worth more than money. If it works, I ask for a testimonial. Zero obligation to pay."',
      warn: ''},
    { id: 'time', label: 'No time for setup', hint: '10 minutes',
      them: 'I don\'t have time for setup',
      you: '"Setup is 10 minutes on your end — total. You answer a few questions, I build it, you don\'t touch it again."',
      warn: ''}
  ],
  V2_OPEN: [
    { id: 'v2_busy', label: 'I\'m busy', hint: 'Bad timing vs not interested',
      them: 'I\'m busy / Don\'t have time',
      you: '"Totally fair — is this a bad time, or is this just not for you?"',
      warn: 'If bad timing: "When\'s better?" If not interested: exit gracefully.'},
    { id: 'v2_sales', label: 'Is this a sales call?', hint: 'Defuse the frame',
      them: 'Are you trying to sell me something?',
      you: '"Not really — I built something and I genuinely want to see if it\'s useful. 30 seconds, then you decide."',
      warn: ''}
  ],
  V2_DISCOVER_OWNER: [
    { id: 'v2_busy', label: 'I\'m busy', hint: 'Bad timing',
      them: 'I\'m busy / Make it quick',
      you: '"Totally fair — just one question: when a customer calls after hours and you can\'t answer, what happens to that call?"',
      warn: ''},
    { id: 'v2_fine', label: 'We\'re fine / Got it handled', hint: 'No perceived gap',
      them: 'We\'re good, we don\'t miss calls',
      you: '"That\'s great. So what happens at 9 PM on a Friday — those go to voicemail or do you have something catching them?"',
      warn: 'If they engage, they DO have a gap. If truly handled, exit gracefully.'},
    { id: 'v2_already', label: 'Already have a service', hint: 'Differentiation',
      them: 'We already have an answering service',
      you: '"Nice. Are they qualifying the calls and texting you details, or just taking a name and number?"',
      warn: ''}
  ],
  V2_DISCOVER_GK: [
    { id: 'v2_cant_decide', label: 'Can\'t make that decision', hint: 'Classic gatekeeper deflection',
      them: 'I don\'t make those decisions',
      you: '"Totally understand. I wouldn\'t want to bother him unless you think it\'s worth it. Can I send a quick audio clip? You listen — if it\'s garbage, you saved his time."',
      warn: ''},
    { id: 'v2_email', label: 'Just send an email', hint: 'Brush-off',
      them: 'Just send us an email',
      you: '"I could, but those always end up in spam. Would you be opposed to a 30-second audio clip instead? Way easier to judge."',
      warn: ''},
    { id: 'v2_not_interested', label: 'He\'s not interested', hint: 'Speaking for the owner',
      them: 'He wouldn\'t be interested in that',
      you: '"That\'s fair — you know him better than I do. What does he usually do about the after-hours calls?"',
      warn: 'Re-opening discovery through the gatekeeper. If they engage, keep going.'}
  ],
  V2_OFFER_OWNER: [
    { id: 'v2_already_o', label: 'Already have something', hint: 'Differentiation',
      them: 'We have something for that',
      you: '"An answering service takes a name and number. This qualifies the call and texts you the full picture so you call back ready to close."',
      warn: ''},
    { id: 'v2_how', label: 'How does it work?', hint: 'Curiosity — good sign',
      them: 'How does that work exactly?',
      you: '"Answers the call, asks qualifying questions, texts you a summary — job type, urgency, contact info. You call back ready to close."',
      warn: 'Keep it brief. Don\'t oversell.'},
    { id: 'v2_cost', label: 'How much?', hint: 'Buying signal',
      them: 'What does it cost?',
      you: '"Founding rate is twelve thousand for the year. Only offering that to the first 3 shops — after that, eighteen with a setup fee."',
      warn: 'If they wince, anchor to their average ticket cost.'}
  ],
  V2_OFFER_GK: [
    { id: 'v2_cant_gk', label: 'Not my call to make', hint: 'Deflection',
      them: 'That\'s not my call to make',
      you: '"100%. That\'s exactly why I\'m not asking you to decide — just listen to a 1-minute clip and tell me if it\'s worth his time."',
      warn: ''},
    { id: 'v2_email_gk', label: 'Just email it', hint: 'Brush-off',
      them: 'Just send it to our email',
      you: '"I can — what\'s the best email? I\'ll send the audio clip and a one-liner."',
      warn: 'If they give the email, that IS the win. Take it and exit.'},
    { id: 'v2_call_owner', label: 'Talk to the owner', hint: 'They want you to bypass them',
      them: 'You should call back and talk to him directly',
      you: '"When\'s the best time to catch him?"',
      warn: 'Get time + name. That\'s the outcome.'}
  ]
};

// --- View Rendering ---

function updateProgress() {
  const prog = document.getElementById('progress');
  if(!prog) return;
  prog.innerHTML = '';
  for (let i = 0; i < totalSteps; i++) {
    const seg = document.createElement('div');
    seg.className = 'seg';
    if (i < currentStepIdx) seg.className += ' done';
    if (i === currentStepIdx) seg.className += ' active';
    prog.appendChild(seg);
  }
}

function renderDock(stepKey) {
  const step = steps[stepKey];
  if(!step) return;
  const phase = step.phase;
  const handlers = CONTEXT_DOCKS[phase] || [];
  
  const dockBody = document.getElementById('dockContent');
  if(!dockBody) return;
  
  dockBody.innerHTML = '';
  if(handlers.length === 0) {
    dockBody.innerHTML = '<div style="padding:24px;color:var(--text-muted);font-size:14px;">No specific handlers for this phase.</div>';
    return;
  }
  
  handlers.forEach(h => {
    const btn = document.createElement('button');
    btn.className = 'dock-btn';
    btn.innerHTML = `
      <div class="dock-them">${h.label}</div>
      <div class="dock-hint">${h.hint}</div>
    `;
    btn.onclick = () => injectHandlerCard(h);
    dockBody.appendChild(btn);
  });
}

function injectHandlerCard(handlerObj) {
  handlerStack.push(handlerObj);
  
  // Create a new layer inside stackContainer
  const container = document.getElementById('stackContainer');
  
  // Mark existing layers as "past" (push them back visually)
  const existingLayers = container.querySelectorAll('.stack-layer.active');
  existingLayers.forEach(el => {
    el.classList.remove('active');
    el.classList.add('past');
  });
  
  const layer = document.createElement('div');
  layer.className = 'stack-layer handler-layer';
  layer.innerHTML = `
    <div class="label" style="background:var(--red-muted);color:var(--red);">Objection</div>
    <div class="dialogue" style="font-size:28px;color:var(--text-secondary);">If they say: "${handlerObj.them}"</div>
    <div class="dialogue">${handlerObj.you}</div>
    ${handlerObj.warn ? `<div class="note warn">${handlerObj.warn}</div>` : ''}
    <button type="button" class="btn return-anchor" onclick="dismissHandler()">
      Return to script
    </button>
  `;
  
  container.appendChild(layer);
  requestAnimationFrame(() => layer.classList.add('active'));
}

function dismissHandler() {
  if (handlerStack.length === 0) return;
  handlerStack.pop();
  
  const container = document.getElementById('stackContainer');
  const layers = container.querySelectorAll('.stack-layer');
  if (layers.length === 0) return;
  
  // Remove the top most
  const topLayer = layers[layers.length - 1];
  topLayer.classList.remove('active');
  
  setTimeout(() => {
    topLayer.remove();
    // Re-activate the underlying layer
    const remaining = container.querySelectorAll('.stack-layer');
    if (remaining.length > 0) {
      remaining[remaining.length - 1].classList.remove('past');
      remaining[remaining.length - 1].classList.add('active');
    }
  }, 300); // match CSS transition duration
}

function phaseDisplay(phase) {
  const map = {
    'V2_OPEN': 'OPEN',
    'V2_DISCOVER_OWNER': 'DISCOVER',
    'V2_DISCOVER_GK': 'DISCOVER',
    'V2_OFFER_OWNER': 'OFFER',
    'V2_OFFER_GK': 'OFFER'
  };
  return map[phase] || phase;
}

function goTo(stepKey) {
  // Clear any open handler overlays
  handlerStack = []; 
  
  const step = steps[stepKey];
  if (!step) return;
  
  // Manage structural history
  globalHistory.push(stepKey);
  currentStepIdx = step.idx;
  
  document.getElementById('stepLabel').textContent = phaseDisplay(step.phase);
  updateProgress();
  renderDock(stepKey);
  
  const container = document.getElementById('stackContainer');
  // Clean sweep for base layer moves
  container.innerHTML = ''; 
  
  const layer = document.createElement('div');
  layer.className = 'stack-layer';
  layer.innerHTML = step.render();
  
  container.appendChild(layer);
  requestAnimationFrame(() => layer.classList.add('active'));
  
  // Focus inputs if any
  const input = layer.querySelector('input');
  if (input) setTimeout(() => input.focus(), 50);
}

function goBack() {
  if (handlerStack.length > 0) {
    dismissHandler();
    return;
  }
  
  if (globalHistory.length <= 1) return;
  globalHistory.pop(); // pop current
  const prev = globalHistory.pop(); // pop to get previous, goTo will re-push it
  goTo(prev);
}

// --- Swipe Logic (iPad Glass Navigation) ---

let touchstartX = 0;
let touchendX = 0;
let touchstartY = 0;
let touchendY = 0;

function handleGesture() {
  const xDiff = touchendX - touchstartX;
  const yDiff = Math.abs(touchendY - touchstartY);
  
  // Must be mostly horizontal swipe
  if (yDiff > Math.abs(xDiff)) return; 
  
  // Swipe Left -> Next (like turning a page)
  if (xDiff < -100) {
    const activeLayer = document.querySelector('.stack-layer.active');
    if(activeLayer) {
        // Find the primary button and click it if it exists
        const nextBtn = activeLayer.querySelector('.btn.primary');
        if(nextBtn) nextBtn.click();
    }
  }
  
  // Swipe Right -> Back
  if (xDiff > 100) {
    goBack();
  }
}

document.addEventListener('touchstart', e => {
  touchstartX = e.changedTouches[0].screenX;
  touchstartY = e.changedTouches[0].screenY;
});

document.addEventListener('touchend', e => {
  touchendX = e.changedTouches[0].screenX;
  touchendY = e.changedTouches[0].screenY;
  // Ignore swipe if we tapped an input/button
  if(['INPUT', 'BUTTON'].includes(e.target.tagName)) return;
  handleGesture();
});

// Key bindings for desktop testing fallback
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft') goBack();
  if (e.key === 'ArrowRight') {
    const activeLayer = document.querySelector('.stack-layer.active');
    if(activeLayer) {
        const nextBtn = activeLayer.querySelector('.btn.primary');
        if(nextBtn) nextBtn.click();
    }
  }
  if (e.key === 'Escape') dismissHandler();
});

          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <div class="dialogue" style="color:var(--green);">Call complete.</div>
      <div class="dialogue-sm" style="margin-bottom:20px;">
        "Appreciate your time, <strong>${prospectName || '[NAME]'}</strong>. Have a good one."
      </div>
      <div class="note" style="font-size:18px;color:var(--text-secondary);">
        Take a breath. Say the next name 3 times.
      </div>
      <div class="note warn">Log: (1) Name, (2) Outcome, (3) Main pain, (4) Follow-up.</div>
      
      <div class="actions" style="margin-top:40px;">
        <button type="button" class="btn primary" onclick="restart()">Next call</button>
      </div>
    `
  },

  // ========================================
  // V2 — "30-Second Permission" Pathway
  // ========================================

  v2_branch: {
    phase: 'V2_OPEN',
    idx: 1,
    render: () => `
      <div class="label">Who picked up? <span class="v2-tag">V2</span></div>
      <div class="tone">TONE: Calm, confident</div>
      <div class="actions col">
        <button type="button" class="btn primary" onclick="goTo('v2_owner_open')">Owner / Decision-maker</button>
        <button type="button" class="btn" onclick="goTo('v2_gk_open')">Gatekeeper / Receptionist</button>
        <button type="button" class="btn ghost" onclick="goTo('openE')">No answer → Leave VM</button>
      </div>
    `
  },

  // --- V2 Owner Path ---

  v2_owner_open: {
    phase: 'V2_OPEN',
    idx: 1,
    render: () => `
      <div class="label">Say this <span class="v2-tag">V2 — OWNER</span></div>
      <div class="tone">TONE: Casual, direct, unhurried</div>
      <div class="dialogue">
        "Hey, I know you're busy and people call all the time. I just need <strong>thirty seconds</strong>, and then you can decide whether or not to hang up. Does that sound fair?"
      </div>
      <div class="note">Wait for agreement. Don't continue until they say yes or give permission.</div>
      
      <div class="actions">
        <button type="button" class="btn primary" onclick="goTo('v2_owner_question')">They agreed → Ask</button>
        <button type="button" class="btn" onclick="goTo('exit_no_gap')">Hard no → Exit</button>
      </div>
    `
  },

  v2_owner_question: {
    phase: 'V2_DISCOVER_OWNER',
    idx: 2,
    render: () => `
      <div class="label">Discover <span class="v2-tag">V2 — OWNER</span></div>
      <div class="tone">TONE: Genuine curiosity</div>
      <div class="dialogue">
        "Can I ask you a quick question about how your shop handles after-hours calls?"
        <span class="beat">Pause — let them process</span>
      </div>
      <div class="dialogue">
        "When a customer calls after hours and you can't answer, <strong>what does that actually cost you?</strong>"
      </div>
      <div class="note">Shut up and listen. Let them talk about losing jobs to competitors, missed revenue, etc.</div>
      
      <div class="actions">
        <button type="button" class="btn primary" onclick="goTo('v2_owner_pitch')">They talked about pain → Pitch</button>
        <button type="button" class="btn" onclick="goTo('exit_no_gap')">No gap → Exit</button>
      </div>
    `
  },

  v2_owner_pitch: {
    phase: 'V2_OFFER_OWNER',
    idx: 4,
    render: () => `
      <div class="label">Bridge to offer <span class="v2-tag">V2 — OWNER</span></div>
      <div class="tone">TONE: Matter-of-fact, connecting the dots</div>
      <div class="dialogue">
        "That makes sense. That's actually why I called. We help HVAC shops <strong>manage exactly that</strong>."
        <span class="beat">Pause</span>
      </div>
      <div class="dialogue">
        "Would it make sense to spend <strong>five minutes</strong> showing you what we've built for this?"
      </div>
      <div class="note">If they say yes → book demo. If "no time right now" → schedule callback.</div>
      
      <div class="actions">
        <button type="button" class="btn primary" onclick="goTo('close_demo')">They want to see it → Demo</button>
        <button type="button" class="btn" onclick="goTo('v2_owner_schedule')">No time right now</button>
        <button type="button" class="btn" onclick="goTo('close_clip')">Send clip instead</button>
        <button type="button" class="btn ghost" onclick="goTo('exit_after_nos')">Not interested → Exit</button>
      </div>
    `
  },

  v2_owner_schedule: {
    phase: 'CLOSE',
    idx: 6,
    render: () => `
      <div class="label">Schedule callback <span class="v2-tag">V2 — OWNER</span></div>
      <div class="dialogue">
        "Totally fair. <strong>When's a better time to reach you?</strong>"
      </div>
      <div class="note">Get the time. Repeat it back. That's the call.</div>
      <div class="dialogue-sm">
        "Perfect — I'll call you [DAY] at [TIME]. Appreciate the 30 seconds, ${prospectName || '[NAME]'}."
      </div>
      <div class="note warn">Stop talking. You got the callback time. That's a win.</div>
      
      <div class="actions">
        <button type="button" class="btn primary" onclick="goTo('done')">Got the time → Done</button>
      </div>
    `
  },

  // --- V2 Gatekeeper Path ---

  v2_gk_open: {
    phase: 'V2_OPEN',
    idx: 1,
    render: () => `
      <div class="label">Say this <span class="v2-tag">V2 — GATEKEEPER</span></div>
      <div class="tone">TONE: Empathetic, peer-to-peer</div>
      <div class="dialogue">
        "Hey, I know you're swamped, and people pitch you all day. I just need <strong>thirty seconds</strong>, and then you can hang up on me if you hate it. Does that sound fair?"
      </div>
      <div class="note">Wait for "okay, go ahead" or similar agreement.</div>
      
      <div class="actions">
        <button type="button" class="btn primary" onclick="goTo('v2_gk_pain')">They agreed → Pain</button>
        <button type="button" class="btn" onclick="goTo('exit_no_gap')">Shut down → Exit</button>
      </div>
    `
  },

  v2_gk_pain: {
    phase: 'V2_DISCOVER_GK',
    idx: 2,
    render: () => `
      <div class="label">Discover pain <span class="v2-tag">V2 — GATEKEEPER</span></div>
      <div class="tone">TONE: Empathetic, curious</div>
      <div class="dialogue">
        "I know how chaotic it gets when the lines are tied up, especially during <strong>peak seasons like June</strong>."
        <span class="beat">Brief pause</span>
      </div>
      <div class="dialogue">
        "When the phones are ringing off the hook and you can't get to every call, <strong>how much of a headache does that create for you the next morning?</strong>"
      </div>
      <div class="note">Let them vent. Angry voicemails, stressed mornings, missed calls — whatever they say, catch it.</div>
      
      <div class="actions">
        <button type="button" class="btn primary" onclick="goTo('v2_gk_mirror')">They shared pain → Mirror</button>
        <button type="button" class="btn" onclick="goTo('exit_no_gap')">No pain → Exit</button>
      </div>
    `
  },

  v2_gk_mirror: {
    phase: 'V2_DISCOVER_GK',
    idx: 3,
    render: () => `
      <div class="label">Mirror technique <span class="v2-tag">V2 — GATEKEEPER</span></div>
      <div class="tone">TONE: Soft, reflecting. Like a therapist.</div>
      <div class="dialogue" style="font-size:28px; color:var(--text-secondary);">
        Repeat the <strong>last 1–3 words</strong> of their complaint as a question.
      </div>
      <div class="q-grid">
        <div class="q-card" onclick="this.classList.toggle('active')">
          <div class="q-text">"Angry voicemails...?"</div>
          <div class="q-when">IF THEY MENTIONED VOICEMAILS</div>
        </div>
        <div class="q-card" onclick="this.classList.toggle('active')">
          <div class="q-text">"Calling the competitor...?"</div>
          <div class="q-when">IF THEY MENTIONED LOSING JOBS</div>
        </div>
        <div class="q-card" onclick="this.classList.toggle('active')">
          <div class="q-text">"Every single morning...?"</div>
          <div class="q-when">IF THEY MENTIONED MORNING STRESS</div>
        </div>
      </div>
      <div class="note">They will elaborate further. Let them. The more they talk, the more they sell the problem.</div>
      
      <div class="actions">
        <button type="button" class="btn primary" onclick="goTo('v2_gk_offer')">They elaborated → Offer</button>
      </div>
    `
  },

  v2_gk_offer: {
    phase: 'V2_OFFER_GK',
    idx: 4,
    render: () => `
      <div class="label">The ask <span class="v2-tag">V2 — GATEKEEPER</span></div>
      <div class="tone">TONE: Collaborative, not pitching</div>
      <div class="dialogue">
        "That makes total sense. We built a system specifically to catch only those <strong>overflow and missed after-hours calls</strong> so you don't have to deal with that."
      </div>
      <div class="dialogue">
        "Would you be opposed to me sending over a quick <strong>1-minute audio clip</strong> of what a customer actually hears when they call?"
      </div>
      <div class="dialogue-sm">
        "You can give it a listen and tell me if it's even worth putting in front of him. I really don't want to blindly pitch the owner if you think it's a bad fit."
      </div>
      <div class="note warn">You're making the gatekeeper the decision-maker. They feel respected, not bypassed.</div>
      
      <div class="actions">
        <button type="button" class="btn primary" onclick="goTo('close_clip')">They said yes → Get email</button>
        <button type="button" class="btn" onclick="goTo('v2_owner_schedule')">Talk to owner later → Schedule</button>
        <button type="button" class="btn ghost" onclick="goTo('exit_after_nos')">No → Exit</button>
      </div>
    `
  }
};

function selectVersion(v) {
  selectedVersion = v;
  document.querySelectorAll('.version-selector .v-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.v === v);
  });
}

function saveName() {
  const nameEl = document.getElementById('nameInput');
  const timeEl = document.getElementById('timeInput');
  if (nameEl) prospectName = nameEl.value.trim() || '';
  if (timeEl) reconTime = timeEl.value.trim() || '';
  goTo(selectedVersion === 'v2' ? 'v2_branch' : 'opener');
}

function restart() {
  prospectName = '';
  reconTime = '';
  currentStepIdx = 0;
  globalHistory.length = 0;
  handlerStack.length = 0;
  goTo('prep');
}

// Start app
goTo('prep');
</script></body></html>
